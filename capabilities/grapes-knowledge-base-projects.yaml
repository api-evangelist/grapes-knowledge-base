naftiko: 1.0.0-alpha2
info:
  label: Grapes Knowledge Base API — Projects
  description: 'Grapes Knowledge Base API — Projects. 3 operations. Lead operation: List projects. Self-contained Naftiko
    capability covering one Grapes Knowledge Base business surface.'
  tags:
  - Grapes Knowledge Base
  - Projects
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GRAPES_KNOWLEDGE_BASE_API_KEY: GRAPES_KNOWLEDGE_BASE_API_KEY
capability:
  consumes:
  - type: http
    namespace: grapes-knowledge-base-projects
    baseUri: https://api.data-grapes.com
    description: Grapes Knowledge Base API — Projects business capability. Self-contained, no shared references.
    resources:
    - name: projects
      path: /projects
      operations:
      - name: get
        method: GET
        description: List projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post
        method: POST
        description: Create project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: projects-projectId
      path: /projects/{projectId}
      operations:
      - name: get
        method: GET
        description: Get project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.GRAPES_KNOWLEDGE_BASE_API_KEY}}'
  exposes:
  - type: rest
    namespace: grapes-knowledge-base-projects-rest
    port: 8080
    description: REST adapter for Grapes Knowledge Base API — Projects. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/projects
      name: projects
      description: REST surface for projects.
      operations:
      - method: GET
        name: get
        description: List projects
        call: grapes-knowledge-base-projects.get
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Create project
        call: grapes-knowledge-base-projects.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{projectid}
      name: projects-projectid
      description: REST surface for projects-projectId.
      operations:
      - method: GET
        name: get
        description: Get project
        call: grapes-knowledge-base-projects.get
        with:
          projectId: rest.projectId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: grapes-knowledge-base-projects-mcp
    port: 9090
    transport: http
    description: MCP adapter for Grapes Knowledge Base API — Projects. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-projects
      description: List projects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: grapes-knowledge-base-projects.get
      outputParameters:
      - type: object
        mapping: $.
    - name: create-project
      description: Create project
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: grapes-knowledge-base-projects.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-project
      description: Get project
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: grapes-knowledge-base-projects.get
      with:
        projectId: tools.projectId
      outputParameters:
      - type: object
        mapping: $.
