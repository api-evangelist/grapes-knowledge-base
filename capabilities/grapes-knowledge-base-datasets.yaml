naftiko: 1.0.0-alpha2
info:
  label: Grapes Knowledge Base API — Datasets
  description: 'Grapes Knowledge Base API — Datasets. 3 operations. Lead operation: List datasets. Self-contained Naftiko
    capability covering one Grapes Knowledge Base business surface.'
  tags:
  - Grapes Knowledge Base
  - Datasets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GRAPES_KNOWLEDGE_BASE_API_KEY: GRAPES_KNOWLEDGE_BASE_API_KEY
capability:
  consumes:
  - type: http
    namespace: grapes-knowledge-base-datasets
    baseUri: https://api.data-grapes.com
    description: Grapes Knowledge Base API — Datasets business capability. Self-contained, no shared references.
    resources:
    - name: datasets
      path: /datasets
      operations:
      - name: get
        method: GET
        description: List datasets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: datasets-import
      path: /datasets/import
      operations:
      - name: post
        method: POST
        description: Import dataset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: datasets-datasetId-export
      path: /datasets/{datasetId}/export
      operations:
      - name: get
        method: GET
        description: Export dataset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: datasetId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.GRAPES_KNOWLEDGE_BASE_API_KEY}}'
  exposes:
  - type: rest
    namespace: grapes-knowledge-base-datasets-rest
    port: 8080
    description: REST adapter for Grapes Knowledge Base API — Datasets. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/datasets
      name: datasets
      description: REST surface for datasets.
      operations:
      - method: GET
        name: get
        description: List datasets
        call: grapes-knowledge-base-datasets.get
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/datasets/import
      name: datasets-import
      description: REST surface for datasets-import.
      operations:
      - method: POST
        name: post
        description: Import dataset
        call: grapes-knowledge-base-datasets.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/datasets/{datasetid}/export
      name: datasets-datasetid-export
      description: REST surface for datasets-datasetId-export.
      operations:
      - method: GET
        name: get
        description: Export dataset
        call: grapes-knowledge-base-datasets.get
        with:
          datasetId: rest.datasetId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: grapes-knowledge-base-datasets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Grapes Knowledge Base API — Datasets. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-datasets
      description: List datasets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: grapes-knowledge-base-datasets.get
      outputParameters:
      - type: object
        mapping: $.
    - name: import-dataset
      description: Import dataset
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: grapes-knowledge-base-datasets.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: export-dataset
      description: Export dataset
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: grapes-knowledge-base-datasets.get
      with:
        datasetId: tools.datasetId
      outputParameters:
      - type: object
        mapping: $.
