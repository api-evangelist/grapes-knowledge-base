aid: grapes-knowledge-base
name: Grapes Knowledge Base
description: >-
  Grapes is a knowledge management platform with administrative, configuration,
  and project management capabilities. The Grapes API allows automation of
  recurring operations including project administration, agent configuration,
  and dataset import/export. Documentation is available in English and French.
